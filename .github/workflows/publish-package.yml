name: Publish Package

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve Package Version
        shell: bash
        run: echo "PACKAGE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Restore
        run: dotnet restore TrueParser.Abp.Nats.slnx

      - name: Test
        run: dotnet test TrueParser.Abp.Nats.slnx --configuration Release --no-restore

      - name: Pack TrueParser.Abp.Nats
        run: >
          dotnet pack src/TrueParser.Abp.Nats/TrueParser.Abp.Nats.csproj
          --configuration Release
          --no-restore
          -p:PackageVersion=${PACKAGE_VERSION}
          -p:ContinuousIntegrationBuild=true
          -o ./artifacts

      - name: Pack TrueParser.Abp.EventBus.Nats
        run: >
          dotnet pack src/TrueParser.Abp.EventBus.Nats/TrueParser.Abp.EventBus.Nats.csproj
          --configuration Release
          --no-restore
          -p:PackageVersion=${PACKAGE_VERSION}
          -p:ContinuousIntegrationBuild=true
          -o ./artifacts

      - name: Push to NuGet
        run: >
          dotnet nuget push ./artifacts/*.nupkg
          --source https://api.nuget.org/v3/index.json
          --api-key ${{ secrets.NUGET_API_KEY }}
          --skip-duplicate
